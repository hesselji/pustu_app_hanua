name: pustu_app_hanua
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.0
  provider: ^6.0.5
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0   # 🔥 TAMBAHAN
  flutter_lints: ^5.0.0

# 🔥 APP ICON
flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo_pustu.png"

# 🔥 NATIVE SPLASH (ANTI LAYAR HITAM)
flutter_native_splash:
  color: "#F5F7FA"
  image: assets/logo_pustu.png

  android: true
  ios: true

  android_12:
    image: assets/logo_pustu.png
    icon_background_color: "#F5F7FA"

flutter:
  uses-material-design: true

  assets:
    - assets/logo_pustu.png
    - assets/logo_bakti_husada.png
    - assets/logo_kemenkes.png